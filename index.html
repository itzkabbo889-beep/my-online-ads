<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমার ইনকাম ওয়েবসাইট</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google AdSense code (ডেমো) -->
    <script data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
</head>
<body>
    <!-- হেডার -->
    <header>
        <img src="images/logo.png" alt="Logo" class="logo">
        <nav>
            <a href="#home">হোম</a>
            <a href="#articles">নিবন্ধ</a>
            <a href="#contact">যোগাযোগ</a>
        </nav>
    </header>

    <!-- হিরো সেকশন -->
    <section id="home" class="hero">
        <h1>ওয়েলকাম আমার ওয়েবসাইটে</h1>
        <p>এখান থেকে আপনি নতুন তথ্য এবং কনটেন্ট পাবেন।</p>
        <!-- Example Ad -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-format="fluid"
             data-ad-layout-key="-gw-3+1f-3d+2z"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="1234567890"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </section>

    <!-- আর্টিকেল সেকশন -->
    <section id="articles" class="content">
        <h2>নতুন নিবন্ধ</h2>
        <article>
            <h3>কিভাবে টাকা ইনকাম করবেন অনলাইনে</h3>
            <p>এই নিবন্ধে আমরা দেখাবো...</p>
        </article>
        <article>
            <h3>ফ্রি ওয়েবসাইটে Ads বসানো</h3>
            <p>ধাপে ধাপে গাইড...</p>
        </article>
        <!-- Another Ad -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-format="fluid"
             data-ad-layout-key="-gw-3+1f-3d+2z"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="0987654321"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </section>

    <!-- Contact -->
    <section id="contact" class="contact">
        <h2>যোগাযোগ করুন</h2>
        <form id="contactForm">
            <input type="text" placeholder="নাম" required>
            <input type="email" placeholder="ইমেইল" required>
            <textarea placeholder="মেসেজ" required></textarea>
            <button type="submit">সাবমিট</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 আমার ওয়েবসাইট. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
